    // Asset Manifest Definition Matrix
    const IMAGES = [

    // Reactive Global Orchestration State
    let activeIndex = 0;
    let isAnimating = false;
    let isMobile = window.innerWidth < 640;

    // DOM Target Registries
    const appShell = document.getElementById('app-shell');
    const carouselViewport = document.getElementById('carousel-viewport');
    const btnPrev = document.getElementById('nav-prev');
    const btnNext = document.getElementById('nav-next');

    // Asynchronous Component Image Preloading Engine
    function preloadImages() {
      IMAGES.forEach((item) => {
        const img = new Image();
        img.src = item.src;
      });
    }

    // Interactive Stage Layout Vector Generation Engine
    function setupCarousel() {
      carouselViewport.innerHTML = '';
      
      IMAGES.forEach((item, index) => {
        const element = document.createElement('div');
        element.className = 'carousel-item absolute aspect-[0.6/1]';
        element.dataset.index = index;

        const img = document.createElement('img');
        img.src = item.src;
        img.alt = `Toonhub Character ${index + 1}`;
        img.className = 'w-full h-full object-contain object-bottom select-none pointer-events-none';
        img.setAttribute('draggable', 'false');

        element.appendChild(img);
        carouselViewport.appendChild(element);
      });
    }

    // Positional Rendering Matrix Update Pipeline
    function render() {
      // Synchronize Canvas Color Bounds
      appShell.style.backgroundColor = IMAGES[activeIndex].bg;

      // Extract Modular Cyclic Roles
      const centerIndex = activeIndex;
      const leftIndex = (activeIndex + 3) % 4;
      const rightIndex = (activeIndex + 1) % 4;
      const backIndex = (activeIndex + 2) % 4;

      const items = carouselViewport.querySelectorAll('.carousel-item');
      
      items.forEach((item) => {
        const index = parseInt(item.dataset.index, 10);
        let styles = {};

        if (index === centerIndex) {
          styles = {
            transform: `translateX(-50%) scale(${isMobile ? 1.25 : 1.68})`,
            filter: 'blur(0px)',
            opacity: '1',
            zIndex: '20',
            left: '50%',
            height: isMobile ? '60%' : '92%',
            bottom: isMobile ? '22%' : '0px'
          };
        } else if (index === leftIndex) {
          styles = {
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(2px)',
            opacity: '0.85',
            zIndex: '10',
            left: isMobile ? '20%' : '30%',
            height: isMobile ? '16%' : '28%',
            bottom: isMobile ? '32%' : '12%'
          };
        } else if (index === rightIndex) {
          styles = {
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(2px)',
            opacity: '0.85',
            zIndex: '10',
            left: isMobile ? '80%' : '70%',
            height: isMobile ? '16%' : '28%',
            bottom: isMobile ? '32%' : '12%'
          };
        } else if (index === backIndex) {
          styles = {
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(4px)',
            opacity: '1',
            zIndex: '5',
            left: '50%',
            height: isMobile ? '13%' : '22%',
            bottom: isMobile ? '32%' : '12%'
          };
        }

        // Apply Extracted Vectors Directly to the DOM elements
        Object.assign(item.style, styles);
      });
    }

    // Rotational Matrix Dispatcher Routing Thread
    function navigate(direction) {
      if (isAnimating) return;
      isAnimating = true;

      if (direction === 'next') {
        activeIndex = (activeIndex + 1) % 4;
      } else if (direction === 'prev') {
        activeIndex = (activeIndex + 3) % 4;
      }

      render();

      // Enforce Component System Lock Duration
      setTimeout(() => {
        isAnimating = false;
      }, 650);
    }

    // Window Vector Resize Change Handler
    function handleResize() {
      const currentMobileState = window.innerWidth < 640;
      if (currentMobileState !== isMobile) {
        isMobile = currentMobileState;
        render();
      }
    }

    // Input Control Subscriptions Initialization
    function bindEvents() {
      btnPrev.addEventListener('click', () => navigate('prev'));
      btnNext.addEventListener('click', () => navigate('next'));
      window.addEventListener('resize', handleResize);
    }

    // Application Bootstrap Thread Execution
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons(); // Initialize Vector Visual Library
      preloadImages();
      setupCarousel();
      render();
      bindEvents();
    });
  </script>
</body>
</html>
